events {
    worker_connections 1024;
}

http {
    # Logging Configuration
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Basic setup
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Nginx Exporter for Prometheus
    server {
        listen 8080;
        server_name _;

        location /stub_status {
            stub_status;
            allow all;
        }
    }

    # Main Gateway Server Block (Path-Based Routing)
    server {
        listen 80;
        server_name _;

        # Route matching /tenant1 exactly to add trailing slash
        location = /tenant1 {
            return 301 /tenant1/;
        }

        # Tenant 1 Path
        location /tenant1/ {
            proxy_pass http://tenant1:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route matching /tenant2 exactly to add trailing slash
        location = /tenant2 {
            return 301 /tenant2/;
        }

        # Tenant 2 Path
        location /tenant2/ {
            proxy_pass http://tenant2:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Default redirect
        location = / {
            return 302 /tenant1/;
        }
    }
}
