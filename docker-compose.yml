version: '3.8'

services:
 
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "8088:8080" # Exposed for prometheus scrape 
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - wp_net
    logging:
      driver: "json-file"

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.0
    command:
      - -nginx.scrape-uri=http://nginx:8080/stub_status
    ports:
      - "9113:9113"
    networks:
      - wp_net
    depends_on:
      - nginx

  
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      TENANT1_DB_NAME: ${TENANT1_DB_NAME}
      TENANT1_DB_USER: ${TENANT1_DB_USER}
      TENANT1_DB_PASSWORD: ${TENANT1_DB_PASSWORD}
      TENANT2_DB_NAME: ${TENANT2_DB_NAME}
      TENANT2_DB_USER: ${TENANT2_DB_USER}
      TENANT2_DB_PASSWORD: ${TENANT2_DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - wp_net

  
  tenant1:
    image: wordpress:latest
    environment:
      WORDPRESS_DB_HOST: mysql
      WORDPRESS_DB_USER: ${TENANT1_DB_USER}
      WORDPRESS_DB_PASSWORD: ${TENANT1_DB_PASSWORD}
      WORDPRESS_DB_NAME: ${TENANT1_DB_NAME}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'http://${SERVER_IP}/tenant1');
        define('WP_SITEURL', 'http://${SERVER_IP}/tenant1');
    volumes:
      - tenant1_data:/var/www/html
    networks:
      - wp_net
    depends_on:
      - mysql
    logging:
      driver: "json-file"

 
  tenant2:
    image: wordpress:latest
    environment:
      WORDPRESS_DB_HOST: mysql
      WORDPRESS_DB_USER: ${TENANT2_DB_USER}
      WORDPRESS_DB_PASSWORD: ${TENANT2_DB_PASSWORD}
      WORDPRESS_DB_NAME: ${TENANT2_DB_NAME}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'http://${SERVER_IP}/tenant2');
        define('WP_SITEURL', 'http://${SERVER_IP}/tenant2');
    volumes:
      - tenant2_data:/var/www/html
    networks:
      - wp_net
    depends_on:
      - mysql
    logging:
      driver: "json-file"

  
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    networks:
      - wp_net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    command:
      - '-port=8080'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - wp_net

  loki:
    image: grafana/loki:2.9.0
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
    ports:
      - "3101:3100"
    networks:
      - wp_net

  promtail:
    image: grafana/promtail:2.9.0
    command: -config.file=/etc/promtail/promtail-config.yaml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
    networks:
      - wp_net

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3001:3000"
    networks:
      - wp_net
    depends_on:
      - prometheus
      - loki

networks:
  wp_net:

volumes:
  mysql_data:
  tenant1_data:
  tenant2_data:

